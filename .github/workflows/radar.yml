name: Radar de Licitacoes (atualizacao diaria)

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "radar_licitacoes.py"
      - ".github/workflows/radar.yml"

permissions:
  contents: write

jobs:
  rodar-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar radar
        run: python radar_licitacoes.py

      - name: Commitar HTML/JSON atualizados
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add docs/index.html docs/radar_licitacoes.json
          git diff --staged --quiet || git commit -m "Atualizacao diaria do radar [skip ci]"
          git push
